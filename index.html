<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <form id = "myForm"> 
            <label for="height">Enter the height for the grid</label>
            <input type="number" id="height" name="height"> <br>
            <label for="length">Enter the length for the grid</label>
            <input type="number" id="length" name="length"> <br>
            <label for="startX">Enter the start X</label>
            <input type="number" id="startX"> <br>
            <label for="startY">Enter the start Y</label>
            <input type="number" id="startY"> <br>
            <label for="endX">Enter the end X</label>
            <input type="number" id="endX"> <br>
            <label for="endY">Enter the end Y</label>
            <input type="number" id="endY"> <br>
            <button>Build grid</button>
        </form>
    </div>
    <style>
    div {text-align: center;}
    td { 
        width: 20px;
        width: 20px;
        height: 20px;
        border: 1px solid #ccc
    }
    table {border-collapse: collapse; margin: 20px auto;}
    #start { background-color: green;}
    #end {background-color: red}
    </style>
    <script src = "java.js"></script>
</body>
</html>
